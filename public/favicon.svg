<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 26 24" 
  fill="none" 
  stroke-width="3" 
  stroke-linecap="round"
>
  <style>
    /* Light Mode tab */
    .wave-bar { stroke: #a855f7; }

    /* Dark Mode tab */
    @media (prefers-color-scheme: dark) {
      .wave-bar { stroke: #c084fc; }
    }
  </style>

  <line class="wave-bar" x1="3" y1="14" x2="3" y2="10" />
  <line class="wave-bar" x1="7" y1="12" x2="7" y2="8" />
  <line class="wave-bar" x1="11" y1="9" x2="11" y2="5" />
  <line class="wave-bar" x1="15" y1="9" x2="15" y2="5" />
  <line class="wave-bar" x1="19" y1="12" x2="19" y2="8" />
  <line class="wave-bar" x1="23" y1="14" x2="23" y2="10" />
</svg>
